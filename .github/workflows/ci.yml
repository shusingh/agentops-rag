name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check .

      - name: Type check
        run: python -m mypy app tests scripts

      - name: Test
        run: python -m pytest

      - name: Eval smoke
        run: python scripts/run_eval.py --dataset evals/datasets/regulatory_qa.jsonl

      - name: Benchmark smoke
        run: python scripts/benchmark.py --requests 20 --concurrency 4
